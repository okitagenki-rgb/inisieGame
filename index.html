<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f7f1e6;color:#2c1a00;min-height:100vh}
.wa-paper{background:#f7f1e6;background-image:repeating-linear-gradient(0deg,transparent,transparent 29px,rgba(160,120,60,0.12) 30px),repeating-linear-gradient(90deg,transparent,transparent 29px,rgba(160,120,60,0.12) 30px)}
.hdr{background:#7a1515;color:#fdf3e0;text-align:center;padding:10px 16px 7px;border-bottom:3px solid #b87800;position:relative}
.hdr h1{font-family:'Noto Serif JP',serif;font-size:20px;letter-spacing:5px}
.hdr-sub{font-size:10px;color:#f0d080;letter-spacing:3px;margin-top:2px}
.mon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:26px;opacity:.7}

.screen{display:none}.screen.active{display:block}

/* ===== TITLE ===== */
.title-body{text-align:center;padding:18px 16px 14px}
.kamon{font-size:58px;line-height:1;margin:6px 0}
.title-main{font-family:'Noto Serif JP',serif;font-size:24px;color:#7a1515;letter-spacing:4px;margin:8px 0 3px}
.title-sub{font-size:12px;color:#5a3a18;margin-bottom:18px}
.mode-row{display:flex;gap:10px;justify-content:center;margin-bottom:16px}
.mode-btn{flex:1;max-width:150px;padding:12px 6px;border:2px solid #7a1515;background:#fdf3e0;color:#7a1515;font-family:'Noto Serif JP',serif;font-size:15px;letter-spacing:2px;border-radius:7px;cursor:pointer;transition:.2s}
.mode-btn:hover,.mode-btn.sel{background:#7a1515;color:#fdf3e0}
.lv-section{background:rgba(122,21,21,.07);border:1px solid rgba(122,21,21,.22);border-radius:8px;padding:12px 14px;max-width:340px;margin:0 auto 16px}
.lv-title{font-family:'Noto Serif JP',serif;font-size:12px;color:#7a1515;text-align:center;margin-bottom:9px;letter-spacing:2px}
.lv-row{display:flex;gap:7px;justify-content:center}
.lv-btn{flex:1;padding:9px 4px;border:2px solid #7a1515;background:#fdf3e0;color:#7a1515;font-family:'Noto Serif JP',serif;font-size:13px;letter-spacing:1px;border-radius:6px;cursor:pointer;transition:.2s}
.lv-btn:hover,.lv-btn.sel{background:#7a1515;color:#fdf3e0}
.lv-desc{margin-top:8px;font-size:11px;color:#7a5020;text-align:center}
.start-btn{display:block;width:190px;margin:0 auto;padding:13px;background:#b87800;color:#fff;font-family:'Noto Serif JP',serif;font-size:17px;letter-spacing:4px;border:none;border-radius:8px;cursor:pointer;transition:.2s}
.start-btn:hover{background:#906000;transform:translateY(-1px)}
.key-hint{margin-top:12px;font-size:11px;color:#7a5020;line-height:1.8}

/* ===== GAME ===== */
.g-bar{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;background:rgba(122,21,21,.07);border-bottom:1px solid rgba(122,21,21,.18);font-size:12px}
.g-badge{background:#7a1515;color:#fdf3e0;padding:3px 9px;border-radius:11px;font-size:11px}
.g-score{color:#7a1515;font-weight:700}
.countdown-wrap{text-align:center;padding:12px 14px 6px;background:#fdf3e0;border:2px solid #b87800;border-radius:8px;margin:10px 10px 4px}
.problem-label{font-size:11px;color:#7a5020;letter-spacing:2px;margin-bottom:6px}
.problem-text{font-family:'Noto Serif JP',serif;font-size:17px;letter-spacing:3px;color:#2c1a00;line-height:1.9}
.problem-blank{display:inline-block;background:#7a1515;color:#fdf3e0;padding:1px 7px;border-radius:3px;min-width:26px;text-align:center}
.hint-row{font-size:10px;color:#9a6030;margin-top:5px;letter-spacing:1px}
.cd-num{font-family:'Noto Serif JP',serif;font-size:36px;color:#7a1515;font-weight:700;text-align:center;padding:8px 0 4px}
.ans-label{font-size:10px;color:#7a5020;margin:3px 10px 2px;letter-spacing:1px}
.ans-area{margin:0 10px 4px;padding:7px 10px;background:#fdf3e0;border:1px dashed #b87800;border-radius:5px;min-height:38px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.ans-char{display:inline-flex;align-items:center;justify-content:center;width:30px;height:34px;background:#b87800;color:#fff;font-family:'Noto Serif JP',serif;font-size:17px;border-radius:4px;cursor:pointer;transition:.15s}
.ans-char:hover{background:#906000;transform:scale(.95)}
.field-wrap{position:relative;display:flex;justify-content:center;align-items:flex-start}
.canvas-wrap{width:340px;height:320px;position:relative;background:#e8ddc8;overflow:hidden;border:2px solid #b87800;border-radius:0}
#gc{width:100%;height:100%;display:block}
.g-actions{display:flex;gap:7px;padding:8px 10px;justify-content:center;flex-wrap:wrap}
.g-btn{padding:9px 16px;border:2px solid #7a1515;background:#fdf3e0;color:#7a1515;font-family:'Noto Serif JP',serif;font-size:13px;letter-spacing:1px;border-radius:6px;cursor:pointer;transition:.2s}
.g-btn:hover{background:#7a1515;color:#fdf3e0}
.g-btn.primary{background:#7a1515;color:#fdf3e0}
.g-btn.primary:hover{background:#5a0e0e}
.touch-note{text-align:center;font-size:10px;color:#9a6030;padding:2px;letter-spacing:1px}

/* popup via normal flow */
.popup-layer{display:none;background:rgba(0,0,0,.45);padding:40px 16px;min-height:300px;align-items:center;justify-content:center}
.popup-layer.show{display:flex}
.popup-box{background:#fdf3e0;border:3px solid #b87800;border-radius:10px;padding:22px 26px;text-align:center;max-width:320px;width:100%}
.popup-ico{font-size:44px;margin-bottom:6px}
.popup-ttl{font-family:'Noto Serif JP',serif;font-size:19px;color:#7a1515;letter-spacing:2px;margin-bottom:7px}
.popup-body{font-family:'Noto Serif JP',serif;font-size:14px;color:#4a3010;line-height:1.8;margin-bottom:14px}
.popup-btn{padding:10px 26px;background:#7a1515;color:#fdf3e0;border:none;border-radius:6px;font-family:'Noto Serif JP',serif;font-size:15px;letter-spacing:2px;cursor:pointer;transition:.2s}
.popup-btn:hover{background:#5a0e0e}

/* AI eval popup extra */
.eval-badge{display:inline-block;padding:4px 14px;border-radius:12px;font-size:13px;font-weight:700;margin-bottom:8px}

/* ===== RESULT ===== */
.result-body{text-align:center;padding:14px 16px}
.zb-emoji{font-size:70px;margin:8px 0;line-height:1}
.zb-title{font-family:'Noto Serif JP',serif;font-size:21px;color:#7a1515;letter-spacing:3px;margin-bottom:5px}
.zb-desc{font-family:'Noto Serif JP',serif;font-size:13px;color:#4a3010;line-height:1.9;margin-bottom:12px;white-space:pre-line}
.score-tbl{background:rgba(122,21,21,.06);border:1px solid rgba(122,21,21,.18);border-radius:8px;padding:10px 14px;max-width:300px;margin:0 auto 12px}
.score-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px solid rgba(122,21,21,.08)}
.score-row:last-child{border-bottom:none}
.review-list{max-width:340px;margin:0 auto 12px;text-align:left}
.review-item{font-size:11px;padding:7px 9px;border-radius:5px;margin-bottom:5px;line-height:1.7}
</style>
<div class="wa-paper">
<div class="hdr">
  <h1 id="hdrTitle">川柳・ことわざ ゲーム</h1>
  <div class="hdr-sub">〜 落ちてくる文字を拾って句を完成させよ 〜</div>
  <span class="mon">⛩</span>
</div>

<!-- TITLE -->
<div id="scTitle" class="screen active">
  <div class="title-body">
    <div class="kamon">🎴</div>
    <div class="title-main">和の文字遊び</div>
    <div class="title-sub">モードを選んで遊びましょう</div>
    <div class="mode-row">
      <button class="mode-btn sel" id="btnModeSenryu" onclick="selectMode('senryu',this)">川　柳</button>
      <button class="mode-btn" id="btnModeKoto" onclick="selectMode('kotowaza',this)">ことわざ</button>
    </div>
    <div class="lv-section">
      <div class="lv-title">〜 難 易 度 〜</div>
      <div class="lv-row">
        <button class="lv-btn sel" onclick="selectLv('ippan',this)">一 般</button>
        <button class="lv-btn" onclick="selectLv('chukyu',this)">中 級</button>
        <button class="lv-btn" onclick="selectLv('meijin',this)">名 人</button>
      </div>
      <div class="lv-desc" id="lvDesc">ゆっくり落ちてきます。じっくり考えて！</div>
    </div>
    <button class="start-btn" onclick="startGame()">は じ め る</button>
    <div class="key-hint">← → キー または 画面タップで左右移動<br>文字に重なると自動で拾います</div>
  </div>
</div>

<!-- GAME -->
<div id="scGame" class="screen">
  <div class="g-bar">
    <span class="g-badge" id="gBadge">一般</span>
    <span class="g-score" id="gCounter">問題 1/10</span>
    <span style="font-size:12px;color:#7a1515" id="gScore">正解: 0</span>
  </div>
  <div class="countdown-wrap">
    <div class="problem-label" id="probLabel">【ことわざ穴埋め】</div>
    <div class="problem-text" id="probText">－</div>
    <div class="hint-row" id="hintRow">ヒント：－</div>
    <div class="cd-num" id="cdNum" style="display:none">5</div>
  </div>
  <div class="ans-label">拾った文字：</div>
  <div class="ans-area" id="ansArea"><span style="font-size:11px;color:#b8a080">文字を拾うとここに集まります</span></div>
  <div class="field-wrap">
    <div class="canvas-wrap">
      <canvas id="gc"></canvas>
    </div>
  </div>
  <div class="touch-note">画面をタップ/スワイプで左右移動</div>
  <div class="g-actions">
    <button class="g-btn" onclick="clearAns()">やり直し</button>
    <button class="g-btn primary" onclick="submitAns()">答える</button>
    <button class="g-btn" onclick="skipQ()">パス</button>
  </div>
</div>

<!-- RESULT -->
<div id="scResult" class="screen">
  <div class="result-body">
    <div class="zb-emoji" id="zbEmoji">🪑</div>
    <div class="zb-title" id="zbTitle">－</div>
    <div class="zb-desc" id="zbDesc">－</div>
    <div class="score-tbl">
      <div class="score-row"><span>正解数</span><span id="rScore" style="font-weight:700;color:#7a1515">0/10</span></div>
      <div class="score-row"><span>モード</span><span id="rMode">－</span></div>
      <div class="score-row"><span>難易度</span><span id="rLv">－</span></div>
      <div class="score-row"><span>座布団</span><span id="rZabu" style="font-weight:700">0枚</span></div>
    </div>
    <div class="review-list" id="reviewList"></div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="g-btn primary" onclick="goTitle()">もう一度</button>
      <button class="g-btn" onclick="goTitle()">モードを変える</button>
    </div>
  </div>
</div>

<!-- POPUP (normal-flow) -->
<div class="popup-layer" id="popupLayer">
  <div class="popup-box">
    <div class="popup-ico" id="pIco">⭕</div>
    <div class="eval-badge" id="evalBadge" style="display:none"></div>
    <div class="popup-ttl" id="pTitle">正解！</div>
    <div class="popup-body" id="pBody">－</div>
    <button class="popup-btn" id="pBtn" onclick="nextQ()">次の問題へ</button>
  </div>
</div>

  meijin:[
    {kami:'世の中は　三日見ぬ間の',shimo:'さくらかな',display:'世の中は　三日見ぬ間の　【下の句を作れ】',hint:'世の無常を桜で詠む',chars:['さ','く','ら','か','な']},
    {kami:'降る雪や　明治は遠く',shimo:'なりにけり',display:'降る雪や　明治は遠く　【下の句を作れ】',hint:'中村草田男の句',chars:['な','り','に','け','り']},
    {kami:'万緑の　中や吾子の歯',shimo:'はえそめし',display:'万緑の　中や吾子の歯　【下の句を作れ】',hint:'緑の中に白い歯',chars:['は','え','そ','め','し']},
    {kami:'夏草や　兵どもが',shimo:'ゆめのあと',display:'夏草や　兵どもが　【下の句を作れ】',hint:'芭蕉の旅・平泉',chars:['ゆ','め','の','あ','と']},
    {kami:'旅に病んで　夢は枯れ野を',shimo:'かけめぐる',display:'旅に病んで　夢は枯れ野を　【下の句を作れ】',hint:'芭蕉の辞世の句',chars:['か','け','め','ぐ','る']}
  ]
};

const ZABUTON=[
  {min:10,max:10,emoji:'🟡',title:'金の座布団！',desc:'十枚積まれた金の座布団！\n俳諧の達人に認定でございます！'},
  {min:8,max:9,emoji:'🪑',title:'銀の座布団！',desc:'立派な腕前！あと一歩で金の座布団。'},
  {min:6,max:7,emoji:'🪑',title:'座布団六枚！',desc:'まずまずの出来栄えでございます。'},
  {min:4,max:5,emoji:'🪑',title:'座布団四枚！',desc:'もう少し精進が必要でございます。'},
  {min:2,max:3,emoji:'🪑',title:'座布団二枚！',desc:'次回はきっと上手くいきます。'},
  {min:0,max:1,emoji:'😅',title:'座布団没収！',desc:'山田くーん、全部持っていって！\n次回はきっと上手くいきます！'}
];

const SPEEDS={ippan:0.55,chukyu:1.1,meijin:1.8};
const LV_DESC={ippan:'ゆっくり落ちてきます。じっくり考えて！',chukyu:'少し速くなります。集中して！',meijin:'速い落下！瞬時の判断を！'};

let gameMode='senryu', level='ippan';
let questions=[], curQ=0, score=0, answers=[], review=[];
let fallingChars=[], playerX=0, animId=null, lastTs=0;
let canvas,ctx,cW=340,cH=320,pW=44,pH=16;
let gameActive=false, countingDown=false, cdLeft=5, cdTimer=null;
let touchSX=0;

function selectMode(m,btn){
  gameMode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('hdrTitle').textContent = m==='senryu'?'川柳 下の句ゲーム':'ことわざ穴埋めゲーム';
}
function selectLv(lv,btn){
  level=lv;
  document.querySelectorAll('.lv-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('lvDesc').textContent=LV_DESC[lv];
}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}

function startGame(){
  const pool = gameMode==='senryu' ? SENRYU_Q[level] : KOTO_Q[level];
  questions=shuffle(pool).slice(0,Math.min(10,pool.length));
  curQ=0;score=0;answers=[];review=[];
  showScreen('scGame');
  initCanvas();
  loadQ();
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

function loadQ(){
  const q=questions[curQ];
  document.getElementById('gCounter').textContent=`問題 ${curQ+1}/${questions.length}`;
  document.getElementById('gScore').textContent=`正解: ${score}`;
  document.getElementById('gBadge').textContent={ippan:'一般',chukyu:'中級',meijin:'名人'}[level];
  answers=[];updateAnsArea();
  fallingChars=[];
  gameActive=false;

  if(gameMode==='kotowaza'){
    document.getElementById('probLabel').textContent='【ことわざ穴埋め】';
    const disp=q.display.replace('□'.repeat(q.blank.length),`<span class="problem-blank">${'□'.repeat(q.blank.length)}</span>`);
    document.getElementById('probText').innerHTML=disp;
    document.getElementById('hintRow').textContent=`ヒント：${q.hint}`;
    spawnKotoChars(q);
  } else {
    document.getElementById('probLabel').textContent='【川柳 下の句作り】';
    document.getElementById('probText').textContent=`上の句：${q.kami}`;
    document.getElementById('hintRow').textContent=`ヒント：${q.hint}`;
    spawnSenryuChars(q);
  }
  startCountdown();
}

function spawnKotoChars(q){
  const correctChars=q.blank.split('');
  const decoys=shuffle([...q.decoys]).slice(0,Math.max(2,5-correctChars.length));
  const all=shuffle([...correctChars,...decoys]).slice(0,5);
  const sp=cW/(all.length+1);
  all.forEach((c,i)=>{
    fallingChars.push({char:c,x:sp*(i+1)+(Math.random()-.5)*15,y:-25-i*45,speed:SPEEDS[level]+(Math.random()*.3),collected:false});
  });
}
function spawnSenryuChars(q){
  const all=shuffle([...q.chars]).slice(0,5);
  const sp=cW/(all.length+1);
  all.forEach((c,i)=>{
    fallingChars.push({char:c,x:sp*(i+1)+(Math.random()-.5)*15,y:-25-i*50,speed:SPEEDS[level]+(Math.random()*.3),collected:false});
  });
}

function startCountdown(){
  cdLeft=5;
  document.getElementById('cdNum').style.display='block';
  document.getElementById('cdNum').textContent=cdLeft;
  countingDown=true;
  if(cdTimer)clearInterval(cdTimer);
  cdTimer=setInterval(()=>{
    cdLeft--;
    if(cdLeft<=0){
      clearInterval(cdTimer);
      document.getElementById('cdNum').style.display='none';
      countingDown=false;
      gameActive=true;
    } else {
      document.getElementById('cdNum').textContent=cdLeft;
    }
  },1000);
}

function initCanvas(){
  canvas=document.getElementById('gc');
  ctx=canvas.getContext('2d');
  cW=canvas.parentElement.clientWidth||340;
  cH=canvas.parentElement.clientHeight||320;
  canvas.width=cW;canvas.height=cH;
  playerX=cW/2-pW/2;
  if(animId)cancelAnimationFrame(animId);
  lastTs=0;
  requestAnimationFrame(loop);
  setupInput();
}

function setupInput(){
  document.onkeydown=e=>{
    if(e.key==='ArrowLeft')playerX=Math.max(0,playerX-18);
    if(e.key==='ArrowRight')playerX=Math.min(cW-pW,playerX+18);
  };
  canvas.ontouchstart=e=>{touchSX=e.touches[0].clientX;e.preventDefault();};
  canvas.ontouchmove=e=>{
    const dx=e.touches[0].clientX-touchSX;
    playerX=Math.max(0,Math.min(cW-pW,playerX+dx*.7));
    touchSX=e.touches[0].clientX;e.preventDefault();
  };
  canvas.onclick=e=>{
    const r=canvas.getBoundingClientRect();
    playerX=Math.max(0,Math.min(cW-pW,e.clientX-r.left-pW/2));
  };
}

function loop(ts){
  if(!lastTs)lastTs=ts;
  const dt=ts-lastTs;lastTs=ts;
  ctx.clearRect(0,0,cW,cH);

  ctx.fillStyle='#e8ddc8';ctx.fillRect(0,0,cW,cH);
  ctx.strokeStyle='rgba(160,120,60,0.13)';ctx.lineWidth=.5;
  for(let y=0;y<cH;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cW,y);ctx.stroke();}

  fallingChars.forEach(fc=>{
    if(fc.collected)return;
    if(gameActive)fc.y+=fc.speed*(dt/16);
    const pcx=playerX+pW/2,pcy=cH-pH-8;
    if(gameActive&&Math.abs(fc.x-pcx)<pW/2+12&&Math.abs(fc.y-pcy)<pH+10){collect(fc);return;}
    if(fc.y>cH+20){fc.y=-25;fc.x=20+Math.random()*(cW-40);}
    const sz=34;
    ctx.fillStyle='#7a1515';
    rr(ctx,fc.x-sz/2,fc.y-sz/2,sz,sz,6);ctx.fill();
    ctx.fillStyle='#fdf3e0';
    ctx.font=`bold 18px 'Noto Serif JP',serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(fc.char,fc.x,fc.y);
  });

  ctx.fillStyle='#b87800';
  rr(ctx,playerX,cH-pH-8,pW,pH,4);ctx.fill();
  ctx.fillStyle='#fff8e0';
  ctx.font=`bold 9px 'Noto Sans JP',sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('⛩',playerX+pW/2,cH-pH/2-8);

  if(countingDown){
    ctx.fillStyle='rgba(122,21,21,.18)';ctx.fillRect(0,0,cW,cH);
    ctx.fillStyle='#7a1515';
    ctx.font=`bold 72px 'Noto Serif JP',serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(document.getElementById('cdNum').textContent,cW/2,cH/2);
  }

  animId=requestAnimationFrame(loop);
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function collect(fc){
  const q=questions[curQ];
  const maxLen=gameMode==='kotowaza'?q.blank.length:q.chars.length;
  if(answers.length>=maxLen)return;
  fc.collected=true;
  answers.push(fc.char);
  updateAnsArea();
  if(answers.length>=maxLen)setTimeout(()=>submitAns(),350);
}

function updateAnsArea(){
  const area=document.getElementById('ansArea');
  if(answers.length===0){area.innerHTML='<span style="font-size:11px;color:#b8a080">文字を拾うとここに集まります</span>';return;}
  area.innerHTML=answers.map((c,i)=>`<span class="ans-char" onclick="removeChar(${i})">${c}</span>`).join('');
}
function removeChar(i){answers.splice(i,1);fallingChars.find(f=>f.collected&&f.char===answers[i])&&(()=>{})();updateAnsArea();}
function clearAns(){answers=[];fallingChars.forEach(f=>f.collected=false);spawnKotoChars(questions[curQ]);if(gameMode==='senryu')spawnSenryuChars(questions[curQ]);updateAnsArea();}

function submitAns(){
  if(countingDown)return;
  const q=questions[curQ];
  gameActive=false;
  if(cdTimer)clearInterval(cdTimer);
  const given=answers.join('');
  if(gameMode==='kotowaza'){
    const ok=given===q.blank;
    if(ok)score++;
    review.push({label:q.display,answer:q.blank,given,correct:ok,mode:'koto'});
    showPopupKoto(ok,q,given);
  } else {
    review.push({label:q.kami,answer:q.shimo,given,correct:null,mode:'senryu'});
    showPopupSenryu(q,given);
  }
}

function showPopupKoto(ok,q,given){
  document.getElementById('pIco').textContent=ok?'⭕':'❌';
  document.getElementById('evalBadge').style.display='none';
  document.getElementById('pTitle').textContent=ok?'正 解 ！':'不 正 解';
  document.getElementById('pBody').innerHTML=`答え：<strong style="color:#7a1515">${q.blank}</strong><br><span style="font-size:12px">${q.display.replace('□'.repeat(q.blank.length),q.blank)}</span>${!ok?`<br><span style="font-size:11px;color:#888">（あなた：${given||'なし'}）</span>`:''}`;
  document.getElementById('pBtn').textContent=curQ<questions.length-1?'次の問題へ':'結果を見る';
  showPopup();
}

async function showPopupSenryu(q,given){
  document.getElementById('pIco').textContent='🤔';
  document.getElementById('evalBadge').style.display='none';
  document.getElementById('pTitle').textContent='AIが評価中…';
  document.getElementById('pBody').innerHTML=`あなたの下の句：<strong style="color:#7a1515">${given||'（なし）'}</strong><br>模範：${q.shimo}`;
  document.getElementById('pBtn').textContent='　…　';
  document.getElementById('pBtn').disabled=true;
  showPopup();
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:300,
        messages:[{role:'user',content:`俳句の採点をしてください。上の句：「${q.kami}」。プレイヤーが作った下の句：「${given||'（なし）'}」。本来の下の句：「${q.shimo}」。\n\n以下のJSON形式のみで返答してください（他の文章は不要）：\n{"score":"◎良い/○まあまあ/△惜しい/×残念","comment":"20字以内の短評","funny":"0〜5の面白さスコア"}`}]
      })
    });
    const data=await res.json();
    const txt=data.content.find(c=>c.type==='text')?.text||'{}';
    const clean=txt.replace(/```json|```/g,'').trim();
    const obj=JSON.parse(clean);
    const scoreColors={'◎':'#1a7a1a','○':'#7a5a00','△':'#7a4a00','×':'#7a1515'};
    const sc=obj.score||'△';
    document.getElementById('pIco').textContent=sc==='◎'?'🌸':sc==='○'?'🌼':sc==='△'?'🍂':'💦';
    document.getElementById('evalBadge').style.cssText=`display:inline-block;padding:4px 14px;border-radius:12px;font-size:13px;font-weight:700;background:${scoreColors[sc]||'#888'};color:#fff;margin-bottom:8px`;
    document.getElementById('evalBadge').textContent=`${sc} 面白さ：${obj.funny||'-'}/5`;
    document.getElementById('pTitle').textContent='AI評価';
    document.getElementById('pBody').innerHTML=`下の句：<strong style="color:#7a1515">${given||'（なし）'}</strong><br><em style="font-size:12px;color:#5a3a10">${obj.comment||''}</em><br><span style="font-size:11px;color:#888">模範の句：${q.shimo}</span>`;
    if(sc==='◎'||sc==='○')score++;
    review[review.length-1].correct=(sc==='◎'||sc==='○');
    review[review.length-1].aiScore=sc;
    review[review.length-1].aiComment=obj.comment||'';
  } catch(e){
    document.getElementById('pTitle').textContent='AIに聞けず…';
    document.getElementById('pBody').innerHTML+=`<br><span style="font-size:11px;color:#888">（ネット接続を確認してください）</span>`;
  }
  document.getElementById('pBtn').textContent=curQ<questions.length-1?'次の問題へ':'結果を見る';
  document.getElementById('pBtn').disabled=false;
}

function showPopup(){document.getElementById('popupLayer').classList.add('show')}
function hidePopup(){document.getElementById('popupLayer').classList.remove('show')}

function nextQ(){
  hidePopup();
  curQ++;
  if(curQ>=questions.length){showResult();return;}
  answers=[];
  gameActive=false;
  loadQ();
  requestAnimationFrame(loop);
}

function skipQ(){
  if(cdTimer)clearInterval(cdTimer);
  const q=questions[curQ];
  review.push({label:gameMode==='kotowaza'?q.display:q.kami,answer:gameMode==='kotowaza'?q.blank:q.shimo,given:'（パス）',correct:false,mode:gameMode});
  curQ++;
  if(curQ>=questions.length){showResult();return;}
  answers=[];gameActive=false;loadQ();
}

function showResult(){
  gameActive=false;
  showScreen('scResult');
  document.getElementById('rScore').textContent=`${score}/${questions.length}`;
  document.getElementById('rMode').textContent=gameMode==='senryu'?'川柳（下の句）':'ことわざ穴埋め';
  document.getElementById('rLv').textContent={ippan:'一般',chukyu:'中級',meijin:'名人'}[level];
  document.getElementById('rZabu').textContent=`${score}枚`;
  const z=ZABUTON.find(z=>score>=z.min&&score<=z.max)||ZABUTON[ZABUTON.length-1];
  document.getElementById('zbEmoji').textContent=z.emoji;
  document.getElementById('zbTitle').textContent=z.title;
  document.getElementById('zbDesc').textContent=z.desc;
  document.getElementById('reviewList').innerHTML=
    '<div style="font-family:\'Noto Serif JP\',serif;font-size:12px;color:#7a1515;text-align:center;margin-bottom:7px;letter-spacing:2px">〜 答え合わせ 〜</div>'+
    review.map((r,i)=>{
      const ok=r.correct===true;
      const col=ok?'rgba(0,100,0,0.07)':'rgba(122,21,21,0.07)';
      const bd=ok?'#2d7a2d':'#7a1515';
      const extra=r.aiScore?`<span style="font-size:10px;color:#7a5a00"> AI：${r.aiScore} ${r.aiComment}</span>`:'';
      return `<div class="review-item" style="background:${col};border:1px solid ${bd}">
        <span style="font-weight:700;color:#4a2a00">${i+1}問</span>
        <span style="float:right">${r.correct===null?'－':ok?'⭕':'❌'}</span><br>
        答え：<span style="color:#7a1515;font-weight:700">${r.answer}</span>
        ${r.given&&r.given!==r.answer?`<span style="color:#888;font-size:10px">（あなた：${r.given}）</span>`:''}
        ${extra}
      </div>`;
    }).join('');
}

function goTitle(){
  gameActive=false;countingDown=false;
  if(cdTimer)clearInterval(cdTimer);
  if(animId)cancelAnimationFrame(animId);
  document.onkeydown=null;
  showScreen('scTitle');
}
</script>
</div>
